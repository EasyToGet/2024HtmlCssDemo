<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 9 - 練習 Emmet 語法</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>標題</h1>
    <p>Lorem ipsum dolor sit.</p>
    <img src="https://ithelp.ithome.com.tw/storage/image/logo.svg" alt="logo" />
    <h2>副標題</h2>
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
    </ul>
    <h2>副標題</h2>
    <p>Lorem ipsum dolor sit.</p>
    
    <hr>
    <h3>解答：</h3>
    <p class="text">
      h1{標題}+(p>lorem4)+img[src="https://ithelp.ithome.com.tw/storage/image/logo.svg"]+h2{副標題}+(ul>li{$}*3)+h2{副標題}+(p>lorem4)
    </p>
  </body>
</html>
